
amcl:
  ros__parameters:

    # Tempo de simulacao
    use_sim_time: true

    # Frames
    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_footprint
    scan_topic: scan

    # Numero de particulas
    min_particles: 1500
    max_particles: 5000

    # Modelo do laser
    laser_model_type: likelihood_field
    laser_max_range: 12.0
    laser_min_range: 0.3
    max_beams: 60
    laser_likelihood_max_dist: 2.0

    # Modelo de movimento diferencial
    robot_model_type: nav2_amcl::DifferentialMotionModel
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # Atualizacao das particulas
    update_min_d: 0.05
    update_min_a: 0.05
    resample_interval: 1

    # Pose inicial aproximada
    set_initial_pose: true
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_a: 0.0
    initial_cov_xx: 1.0
    initial_cov_yy: 1.0
    initial_cov_aa: 0.5

    # Recuperacao - robo sequestrado
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    # TF
    transform_tolerance: 0.5
    tf_broadcast: true

    save_pose_rate: 0.5
    first_map_only: false